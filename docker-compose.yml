services:
  # 1. Agent: Base de Données PostGreSQL (Stockage des données brutes et des prédictions)
  db:
    image: postgres:15-alpine
    container_name: eu_brp_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-eubrp_db}
    # Initialisation du schéma de la BDD lors du premier démarrage
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db_init/db_schema.sql:/docker-entrypoint-initdb.d/db_schema.sql
    # Bind to loopback only so the database is reachable from the host (psql,
    # debugging) without being exposed on every interface. Other services in
    # the compose network reach it via the internal "db" hostname regardless.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - eubrp_net

  # 2. Agent: Data_Harvester (Récolte et nettoyage des données Eurostat)
  data_harvester:
    build:
      context: ./data_harvester
      dockerfile: Dockerfile
    container_name: eu_brp_harvester
    restart: on-failure
    # S'assure que la BDD est prête avant de démarrer le Harvester
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-user}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-eubrp_db}
      DB_PORT: ${DB_PORT:-5432}
      RETRY_MAX_ATTEMPTS: ${RETRY_MAX_ATTEMPTS:-3}
      RETRY_BACKOFF_SECONDS: ${RETRY_BACKOFF_SECONDS:-2}
      EXIT_ON_FAILURE: ${EXIT_ON_FAILURE:-true}
      HARVESTER_HEALTH_FILE: ${HARVESTER_HEALTH_FILE:-/tmp/harvester_health}
      HARVESTER_MONTHS: ${HARVESTER_MONTHS:-60}
      HARVESTER_TIME_CHUNK: ${HARVESTER_TIME_CHUNK:-12}
    # Command: exécute le script (peut être remplacé par un scheduler en production)
    command: python /app/harvester_tsv.py
    healthcheck:
      test: [ "CMD-SHELL", "python /app/harvester_tsv.py --healthcheck" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - eubrp_net

  # 3. Agent: Risk_Predictor (Calcul du risque et entraînement du modèle IA)
  risk_predictor:
    build:
      context: ./risk_predictor
      dockerfile: Dockerfile
    container_name: eu_brp_predictor
    restart: on-failure
    # Dépend de la DB pour démarrer. Le script attendra les données.
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-user}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-eubrp_db}
      DB_PORT: ${DB_PORT:-5432}
      RETRY_MAX_ATTEMPTS: ${RETRY_MAX_ATTEMPTS:-3}
      RETRY_BACKOFF_SECONDS: ${RETRY_BACKOFF_SECONDS:-2}
      EXIT_ON_FAILURE: ${EXIT_ON_FAILURE:-true}
      PREDICTOR_HEALTH_FILE: ${PREDICTOR_HEALTH_FILE:-/tmp/predictor_health}
    command: python /app/risk_predictor.py
    healthcheck:
      test: [ "CMD-SHELL", "python /app/risk_predictor.py --healthcheck" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - eubrp_net

  # 4. Agent: API_Service (FastAPI Backend)
  api_service:
    build:
      context: ./api_service
      dockerfile: Dockerfile
    container_name: eu_brp_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-user}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-eubrp_db}
      DB_PORT: ${DB_PORT:-5432}
      API_KEY: ${API_KEY:-}
    ports:
      - "8000:8000"
    command: uvicorn api_service.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: [ "CMD", "python", "-m", "api_service.healthcheck" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - eubrp_net

  # 5. Tableau de bord Streamlit
  dashboard:
    build:
      context: ./api_service
      dockerfile: Dockerfile
    container_name: eu_brp_dashboard
    depends_on:
      api_service:
        condition: service_healthy
    environment:
      API_URL: http://api_service:8000
      API_KEY: ${API_KEY:-}
    ports:
      - "8501:8501"
    command: streamlit run api_service/dashboard.py --server.port 8501 --server.address 0.0.0.0 --server.enableCORS false
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import sys,requests; sys.exit(0 if requests.get('http://localhost:8501/_stcore/health', timeout=2).status_code==200 else 1)\"" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - eubrp_net

# Volumes pour la persistance des données
volumes:
  db_data:

    # Réseau interne pour la communication des services
networks:
  eubrp_net:
    driver: bridge
